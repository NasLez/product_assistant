services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-product_assistant}
      MYSQL_USER: ${MYSQL_USER:-product_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: UTC
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - product-assistant

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-product_assistant}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-product_app}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      RAINFOREST_API_KEY: ${RAINFOREST_API_KEY:-}
      RAINFOREST_BASE_URL: ${RAINFOREST_BASE_URL:-https://api.rainforestapi.com}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      VIDEO_SCRIPT_ACTIVE_KEY_VERSION: ${VIDEO_SCRIPT_ACTIVE_KEY_VERSION:-v1}
      VIDEO_SCRIPT_ENCRYPTION_KEYS: ${VIDEO_SCRIPT_ENCRYPTION_KEYS}
      VIDEO_SCRIPT_BACKFILL_ENABLED: ${VIDEO_SCRIPT_BACKFILL_ENABLED:-false}
      VIDEO_SCRIPT_BACKFILL_BATCH_SIZE: ${VIDEO_SCRIPT_BACKFILL_BATCH_SIZE:-100}
      AUTH_RATE_LIMIT_ATTEMPTS: ${AUTH_RATE_LIMIT_ATTEMPTS:-10}
      AUTH_RATE_LIMIT_WINDOW: ${AUTH_RATE_LIMIT_WINDOW:-10m}
      POINT_RESERVATION_TIMEOUT: ${POINT_RESERVATION_TIMEOUT:-15m}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - product-assistant

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      PUBLIC_SERVER_NAME: ${PUBLIC_SERVER_NAME}
      NGINX_ENVSUBST_FILTER: ^PUBLIC_SERVER_NAME$
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/https.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./deploy/tls:/etc/nginx/tls:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O - https://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - product-assistant

volumes:
  mysql-data:
    name: product-assistant-mysql-data-20260719

networks:
  product-assistant:
    driver: bridge
